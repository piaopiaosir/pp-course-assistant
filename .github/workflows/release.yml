name: Auto Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract script version
        id: script_ver
        run: |
          VER=$(grep '// @version' 'script.user.js' | head -1 | awk '{print $NF}')
          echo "ver=$VER" >> $GITHUB_OUTPUT

      - name: Generate release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" --reverse)
          else
            NOTES=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --reverse)
          fi
          {
            echo "## 版本信息"
            echo ""
            echo "**用户端.js** → \`${{ steps.script_ver.outputs.ver }}\`"
            echo ""
            echo "## 更新日志"
            echo "$NOTES"
          } > release_notes.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          body_path: release_notes.txt
          files: |
            script.user.js
          draft: false
          prerelease: false
